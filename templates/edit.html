<!DOCTYPE html>
<html>

<head>
  <title>Muokkaa tapahtumaa</title>
</head>

<body>
  <h2>Muokkaa tapahtumaa</h2>

  <form action="/edit/{{ event.id }}" method="post">
    <p>
      Otsikko:<br />
      <input type="text" name="title" value="{{ event.title }}" required />
    </p>
    <p>
      Päivämäärä:<br />
      <input type="date" id="date" name="date" value="{{ event.date }}" required />
    </p>
    <p>
      Pelaajien määrä:<br />
      <input type="text" name="num_players" value="{{ event.num_players }}" required />
    </p>
    <p>
      Kuvaus:<br />
      <textarea name="description" rows="5" cols="40" required>{{ event.description }}</textarea>
    </p>
    <input type="submit" value="Lähetä" />
  </form>
  <p>
    <a href="/">Etusivulle</a>
  </p>
</body>

</html>
